<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--codex-default-meta-->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
</style>
  </head>

  <body>
    <noscript>
      <style>
        [style*="opacity:0"] { opacity: 1 !important; }
        [style*="opacity: 0"] { opacity: 1 !important; }
        [style*="transform:translate"] { transform: none !important; }
        [style*="transform: translate"] { transform: none !important; }
        [style*="transform:scale"] { transform: none !important; }
        [style*="transform: scale"] { transform: none !important; }
        [hidden][data-state][data-orientation][role="region"] { display: block !important; }
        [data-state][data-orientation][role="region"] {
          height: auto !important;
          overflow: visible !important;
          animation: none !important;
        }
        .js-only { display: none !important; }
      </style>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
